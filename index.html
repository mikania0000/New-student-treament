<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鳳甲國中報到管理系統</title>
    <!-- 引入外部資源 -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        :root {
            --primary: #007BFF;
            --bg: #f4f7f9;
            --text: #333;
            --accent: #FF69B4;
            --success: #28a745;
            --danger: #D32F2F;
            --warning: #FFA500;
        }

        body {
            background-color: var(--bg);
            font-family: "Microsoft JhengHei", sans-serif;
            color: var(--text);
            margin: 0; padding-bottom: 80px;
            font-size: 16px; /* 整體字體加大 */
        }

        /* --- 登入畫面 --- */
        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            z-index: 99999; display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center;
            width: 90%; max-width: 400px;
        }
        .login-box h4 { color: #444; font-weight: bold; margin-bottom: 10px; font-size: 24px; }
        .login-box p { color: #888; font-size: 16px; margin-bottom: 25px; }

        .auth-section {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 120px;
        }

        /* --- 主程式佈局 --- */
        #main-app { display: none; }
        .app-container { max-width: 98%; margin: 20px auto; padding: 0 15px; }
        .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 25px; margin-bottom: 20px; border: none; }
        .header-row { display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--primary); padding-left: 15px; margin-bottom: 20px; }
        
        /* 搜尋條件網格 */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .form-grid label { font-weight: bold; color: #555; margin-bottom: 8px; font-size: 15px; }
        .form-control-sm { height: calc(1.5em + 0.75rem + 2px); font-size: 15px; }
        
        /* 按鈕群組 */
        .btn-group-custom { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .btn-custom { padding: 10px 20px; border-radius: 6px; border: none; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; font-size: 15px;}
        .btn-custom:hover { opacity: 0.9; transform: translateY(-1px); }

        /* --- 分頁切換 --- */
        .page { display: none; }
        .page.active { display: block; }

        /* --- 查詢結果表格優化 --- */
        .table-wrapper { width: 100%; overflow-x: auto; border-radius: 6px; border: 1px solid #dee2e6; background: #fff; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 15px; margin: 0; table-layout: auto; }
        .data-table th { background: #f8f9fa; color: #333; padding: 12px 8px; text-align: center; white-space: nowrap; border: 1px solid #dee2e6; font-weight: bold; font-size: 15px; }
        .data-table td { padding: 8px 6px; border: 1px solid #dee2e6; text-align: center; vertical-align: middle; word-break: break-word; }
        .data-table tbody tr:hover { background-color: #f4f8ff; }
        
        /* 針對關鍵欄位禁止換行且字體加粗 */
        .nowrap-col { white-space: nowrap !important; font-weight: bold; color: #222; min-width: 80px; }
        
        /* 畢業國小欄位緊縮 */
        .compact-col { max-width: 120px; font-size: 14px; color: #666; }

        /* 垂直按鈕容器：操作欄位加寬一點點 */
        .action-stack { display: flex; flex-direction: column; gap: 4px; align-items: center; min-width: 75px; padding: 4px 0; }
        .btn-stack { width: 100%; font-size: 13px !important; padding: 4px 6px !important; font-weight: bold; }

        .transfer-row { background-color: #fff0f4 !important; color: #d63384 !important; }
        .editable input { width: 100%; padding: 4px; font-size: 14px; text-align: center; border: 1px solid var(--primary); border-radius: 4px; box-sizing: border-box; }
        .editing-row { background-color: #fff3cd !important; }

        /* --- 統計看板 --- */
        .stats-wrapper { border-radius: 6px; border: 1px solid #dee2e6; overflow: hidden; background: white; }
        .stats-table { width: 100%; border-collapse: collapse; font-size: 15px; margin: 0; }
        .stats-table td { padding: 10px; border-bottom: 1px solid #dee2e6; vertical-align: middle; }
        .stats-table tr:last-child td { border-bottom: none; }
        .stats-table td:first-child { width: 55%; color: #666; border-right: 1px solid #dee2e6; font-weight: bold; }
        .stats-table td.val-col { text-align: right; font-weight: bold; color: #333; font-size: 16px; }
        .stats-table .highlight-row td { color: var(--primary); font-weight: bold; background-color: #f8f9fa; }
        .stats-table .pink-row td { background-color: #fff0f4; color: #d63384; font-weight: bold; }

        /* --- 匯入預覽區 --- */
        .header-hint-box { background: #e9f3ff; border: 1px solid #b8daff; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .header-tag { display: inline-block; background: #fff; border: 1px solid #007bff; color: #007bff; padding: 4px 10px; border-radius: 4px; font-size: 13px; margin-right: 6px; margin-bottom: 6px; font-weight: bold; }
        .drop-zone { border: 2px dashed #ccc; border-radius: 10px; padding: 35px; text-align: center; color: #888; cursor: pointer; transition: 0.3s; background: #fafafa; font-size: 16px; }
        .drop-zone:hover { border-color: var(--primary); background: #f0f7ff; color: var(--primary); }

        /* --- 提示訊息與彈窗 --- */
        #toast-msg { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 30px; border-radius: 30px; color: white; z-index: 100000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-size: 16px; font-weight: bold; }
        .modal-box { background: white; padding: 30px; border-radius: 12px; width: 95%; max-width: 850px; }
        .modal-box h5 { font-size: 20px; border-bottom: 2px solid #eee; padding-bottom: 12px; }

        @media (max-width: 991px) {
            .bottom-nav { display: flex; }
            .mobile-page { display: none; }
            .mobile-page.active { display: block; }
            #page-stats { display: none; }
            #page-stats.active { display: block !important; }
        }
        @media (min-width: 992px) {
            #page-stats { display: block !important; }
        }
    </style>
</head>
<body>

    <!-- 登入畫面 -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-box">
            <h4>系統登入</h4>
            <p>鳳甲國中報到管理系統</p>
            <div class="auth-section">
                <div id="g_id_onload"
                    data-client_id="553016940521-araovlp30ctbqn6um5rr49q3es5jm4jg.apps.googleusercontent.com"
                    data-callback="onGoogleSignIn"
                    data-auto_prompt="false">
                </div>
                <div id="g-btn-wrapper">
                    <div class="g_id_signin" data-type="standard" data-theme="outline" data-size="large" data-width="300"></div>
                </div>
                <div id="loading-msg" style="display: none; color: var(--primary); font-size: 16px; margin-top: 15px; font-weight: bold;">
                    <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                    驗證授權中...
                </div>
                <div id="login-msg" style="display: none; margin-top: 15px; color: var(--danger); font-size: 14px; padding: 10px; background: #fdf2f2; border-radius: 6px; border: 1px solid #f5c6cb;"></div>
            </div>
        </div>
    </div>

    <!-- 提示訊息 -->
    <div id="toast-msg"></div>

    <!-- 主程式區域 -->
    <div id="main-app">
        <div class="app-container">
            <div class="row">
                <!-- 左側內容 -->
                <div id="content-col" class="col-lg-9">
                    
                    <!-- 分頁1：報到管理 -->
                    <div id="page-home" class="page active mobile-page">
                        <div class="card">
                            <div class="header-row">
                                <h5 class="m-0 text-secondary font-weight-bold">報到管理作業</h5>
                                <div>
                                    <span id="user-display" class="text-muted small mr-3"></span>
                                    <button class="btn btn-outline-secondary btn-sm" onclick="logout()">安全登出</button>
                                </div>
                            </div>
                            
                            <div class="form-grid">
                                <div><label>臨時編號</label><input type="text" id="q-id" class="form-control form-control-sm" placeholder="輸入編號"></div>
                                <div><label>身分證號</label><input type="text" id="q-idnum" class="form-control form-control-sm" placeholder="輸入證號"></div>
                                <div><label>學生姓名</label><input type="text" id="q-name" class="form-control form-control-sm" placeholder="輸入姓名"></div>
                                <div><label>畢業國小</label><select id="q-school" class="form-control form-control-sm"><option value="">全部國小</option></select></div>
                                <div>
                                    <label>報到狀態</label>
                                    <select id="q-status" class="form-control form-control-sm">
                                        <option value="">全部狀態</option>
                                        <option value="已報到">已報到</option>
                                        <option value="未報到">未報到</option>
                                    </select>
                                </div>
                            </div>

                            <div class="btn-group-custom">
                                <button class="btn-custom" style="background: var(--primary);" onclick="searchData()">🔍 執行查詢</button>
                                <button class="btn-custom" style="background: #20c997;" onclick="$('#addModal').css('display','flex')">➕ 新增新生</button>
                                <button class="btn-custom" style="background: #6c757d;" onclick="openImportModal('student')">📥 匯入名單</button>
                                <button class="btn-custom" style="background: #e83e8c;" onclick="openImportModal('sports')">🏀 匯入體育班</button>
                                <button class="btn-custom" style="background: #6610f2;" onclick="switchTab('accounts', document.querySelector('.nav-item[data-tab=accounts]'))">⚙️ 帳號管理</button>
                                <button class="btn-custom" style="background: #adb5bd;" onclick="clearFields()">🧹 清除</button>
                                <button class="btn-custom ml-auto" style="background: var(--danger);" onclick="$('#resetModal').css('display','flex')">⚠️ 重置系統</button>
                            </div>
                        </div>

                        <div class="card">
                            <div id="result-area" class="table-wrapper">
                                <p class="text-center py-4 text-muted">請輸入條件後點擊「執行查詢」</p>
                            </div>
                        </div>
                    </div>

                    <!-- 分頁2：帳號管理 -->
                    <div id="page-accounts" class="page mobile-page">
                        <div class="card">
                            <div class="header-row">
                                <h5 class="m-0 text-secondary font-weight-bold">帳號授權管理 (白名單)</h5>
                                <button class="btn btn-outline-primary btn-sm" onclick="switchTab('home', document.querySelector('.nav-item[data-tab=home]'))">返回報到管理</button>
                            </div>
                            <p class="text-muted">只有在此名單內的 Google 帳號可以登入本系統。</p>
                            <div class="d-flex mb-3" style="gap: 10px;">
                                <input type="email" id="new-whitelist-email" class="form-control" placeholder="欲授權的 Google Email">
                                <button class="btn btn-primary px-4 font-weight-bold" onclick="saveWhitelistAccount()">新增授權</button>
                            </div>
                            <div id="whitelist-area" class="table-wrapper">
                                <p class="text-center py-4 text-muted">正在讀取授權名單...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 右側：統計看板 -->
                <div id="page-stats" class="col-lg-3 mobile-page">
                    <div class="card">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h6 class="m-0 font-weight-bold text-secondary" style="font-size: 18px;">📊 系統統計</h6>
                            <button class="btn btn-sm btn-light border" onclick="loadStats()">↻ 刷新</button>
                        </div>
                        <div id="stats-area">
                            <p class="text-center py-4 text-muted small">載入中...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 手機版導覽列 -->
        <div class="bottom-nav">
            <a href="javascript:void(0)" class="nav-item active" data-tab="home" onclick="switchTab('home', this)">報到管理</a>
            <a href="javascript:void(0)" class="nav-item" data-tab="accounts" onclick="switchTab('accounts', this)">帳號管理</a>
            <a href="javascript:void(0)" class="nav-item" data-tab="stats" onclick="switchTab('stats', this)">統計看板</a>
        </div>
    </div>

    <!-- ================= 彈窗區 ================= -->
    <div id="addModal" class="modal-custom">
        <div class="modal-box">
            <h5>➕ 手動新增新生</h5>
            <div class="row">
                <div class="col-6 form-group"><label>臨時編號 *</label><input type="text" id="nT" class="form-control"></div>
                <div class="col-6 form-group"><label>身分證號</label><input type="text" id="nI" class="form-control"></div>
                <div class="col-6 form-group"><label>姓名 *</label><input type="text" id="nN" class="form-control"></div>
                <div class="col-6 form-group"><label>性別</label><select id="nG" class="form-control"><option value="男">男</option><option value="女">女</option></select></div>
                <div class="col-12 form-group"><label>畢業國小</label><input type="text" id="nS" class="form-control"></div>
                <div class="col-6 form-group"><label>電話 1</label><input type="text" id="nP1" class="form-control"></div>
                <div class="col-6 form-group"><label>電話 2</label><input type="text" id="nP2" class="form-control"></div>
            </div>
            <div class="d-flex mt-3" style="gap: 12px;">
                <button class="btn btn-primary btn-lg flex-grow-1 font-weight-bold" onclick="saveNewStudent()">儲存學生資料</button>
                <button class="btn btn-light btn-lg flex-grow-1 border" onclick="$('#addModal').hide()">取消</button>
            </div>
        </div>
    </div>

    <div id="importModal" class="modal-custom">
        <div class="modal-box">
            <h5 id="import-title">📥 專業數據匯入</h5>
            <div class="header-hint-box">
                <div class="small font-weight-bold text-primary mb-2">📋 建議 Excel 欄位對照：</div>
                <div id="header-tags-container"></div>
            </div>
            <ul class="nav nav-tabs mb-3" role="tablist">
                <li class="nav-item"><a class="nav-link active py-2 small" data-toggle="tab" href="#tab-file">Excel 檔案</a></li>
                <li class="nav-item"><a class="nav-link py-2 small" data-toggle="tab" href="#tab-paste">文字貼上</a></li>
            </ul>
            <div class="tab-content">
                <div class="tab-pane fade show active" id="tab-file">
                    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
                        <div class="mb-2">📄 點擊或將 Excel 檔案拖曳至此</div>
                        <input type="file" id="file-input" style="display:none" accept=".xlsx, .xls, .csv" onchange="handleFileSelect(this)">
                    </div>
                </div>
                <div class="tab-pane fade" id="tab-paste">
                    <textarea id="paste-area" class="form-control" style="height: 120px;" placeholder="請複製包含標頭的整列資料貼於此..." oninput="parsePasteData()"></textarea>
                </div>
            </div>
            <div id="preview-section" style="display:none">
                <div class="mt-3 d-flex justify-content-between align-items-center"><strong class="small">預覽 (僅顯示前10筆)：</strong><span id="import-count" class="badge badge-info px-2">共 0 筆</span></div>
                <div class="preview-container"><table class="table table-sm table-bordered preview-table mb-0"><thead id="preview-thead"></thead><tbody id="preview-tbody"></tbody></table></div>
            </div>
            <div class="d-flex mt-3" style="gap: 12px;">
                <button id="import-confirm-btn" class="btn btn-primary font-weight-bold flex-grow-1" onclick="processImport()" disabled>🚀 確認並覆蓋資料庫</button>
                <button class="btn btn-light border flex-grow-1" onclick="$('#importModal').hide(); resetImport()">取消</button>
            </div>
        </div>
    </div>

    <div id="resetModal" class="modal-custom">
        <div class="modal-box text-center">
            <h5 class="text-danger mb-3 font-weight-bold">⚠️ 危險：系統清空確認</h5>
            <p class="text-muted">這將清空所有的學生名單、報到時間與統計數據。<br>此操作無法復原，您確定要執行嗎？</p>
            <div class="d-flex mt-4" style="gap: 12px;">
                <button class="btn btn-danger btn-lg flex-grow-1 font-weight-bold" onclick="systemReset()">確認清空全部資料</button>
                <button class="btn btn-light border btn-lg flex-grow-1" onclick="$('#resetModal').hide()">取消</button>
            </div>
        </div>
    </div>

    <!-- ================= 腳本區 ================= -->
    <script>
        const DEPLOY_URL = "https://script.google.com/macros/s/AKfycbxpY4iHHkEkdNsBvLdb2OJPqzn0eY14CWjLRiEoDJ0IBUhucE2Pp5dJepyZR5AxP_LO/exec";
        let sessionToken = sessionStorage.getItem('fjm_token') || "";
        let currentImportType = 'student';
        let stagedData = [];

        async function onGoogleSignIn(response) {
            $('#g-btn-wrapper').hide(); $('#login-msg').hide(); $('#loading-msg').show();
            try {
                const res = await apiFetch('login', { credential: response.credential });
                if (res.status === 'success') {
                    sessionToken = res.token; sessionStorage.setItem('fjm_token', sessionToken);
                    $('#user-display').text(res.email); $('#login-overlay').fadeOut(); $('#main-app').fadeIn();
                    initApp();
                } else { showLoginError(res.message || "驗證失敗"); }
            } catch (e) { showLoginError("伺服器連線異常"); }
        }

        function showLoginError(msg) { $('#loading-msg').hide(); $('#g-btn-wrapper').show(); $('#login-msg').text(msg).show(); if (google?.accounts?.id) google.accounts.id.disableAutoSelect(); }

        function initApp() {
            loadSchools(); loadStats(); setInterval(loadStats, 30000); 
            const dz = document.getElementById('drop-zone');
            if(dz) {
                dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.style.borderColor = '#007BFF'; });
                dz.addEventListener('dragleave', () => { dz.style.borderColor = '#ccc'; });
                dz.addEventListener('drop', (e) => { e.preventDefault(); dz.style.borderColor = '#ccc'; const files = e.dataTransfer.files; if(files.length) handleFileSelect({files: files}); });
            }
        }

        async function logout() {
            if (sessionToken) try { await apiFetch('logout', {}); } catch (e) {}
            sessionStorage.removeItem('fjm_token'); sessionToken = "";
            if (google?.accounts?.id) google.accounts.id.disableAutoSelect();
            location.reload();
        }

        function apiFetch(action, data) {
            const callback = 'cb_' + Math.floor(Math.random() * 1000000);
            return new Promise((resolve) => {
                window[callback] = (res) => { resolve(res); delete window[callback]; $(`#${callback}`).remove(); if(res?.status === 'unauthorized') { alert('登入逾時，請重新登入'); logout(); } };
                const script = document.createElement('script'); script.id = callback;
                const encodedData = encodeURIComponent(JSON.stringify(data));
                script.src = `${DEPLOY_URL}?action=${action}&token=${sessionToken}&callback=${callback}&data=${encodedData}&v=${Date.now()}`;
                document.body.appendChild(script);
            });
        }

        function clearFields() {
            $('#q-id, #q-idnum, #q-name, #q-school, #q-status').val('');
            $('#result-area').html('<p class="text-center py-4 text-muted">查詢條件已清除</p>');
            showToast("已重設搜尋條件", "var(--primary)");
        }

        async function loadSchools() {
            const res = await apiFetch('getPrimarySchools', {});
            if(res.status === 'success') { $('#q-school').html('<option value="">全部國小</option>'); res.data.forEach(s => $('#q-school').append(`<option value="${s}">${s}</option>`)); }
        }

        async function loadStats() {
            const res = await apiFetch('getStatisticsData', {});
            if(res.status !== 'success') return;
            let html = '<div class="stats-wrapper"><table class="stats-table"><tbody>';
            res.data.forEach((r, i) => {
                const isHeader = i < 2; const isPink = String(r[0]).includes('未聯絡人數') || String(r[0]).includes('剩餘名額');
                let rowClass = isHeader ? 'highlight-row' : (isPink ? 'pink-row' : '');
                let val = r[1];
                if (String(r[0]).includes('目標人數')) val = String(val).replace('(', '<br><span style="font-size:0.85em; color:#888;">(').concat('</span>');
                html += `<tr class="${rowClass}"><td>${r[0]}</td><td class="val-col">${val}</td></tr>`;
            });
            $('#stats-area').html(html + '</tbody></table></div>');
        }

        async function searchData() {
            const filter = { tempId: $('#q-id').val().trim(), idNumber: $('#q-idnum').val().trim(), studentName: $('#q-name').val().trim(), primarySchool: $('#q-school').val(), reportStatus: $('#q-status').val() };
            $('#result-area').html('<p class="text-center py-4"><span class="spinner-border text-primary"></span><br>資料查詢中...</p>');
            const res = await apiFetch('queryStudentData', filter);
            if(res.status !== 'success' || !res.data.length) return $('#result-area').html('<p class="text-center py-4 text-danger font-weight-bold">查無符合條件的資料</p>');
            
            let html = '<table class="data-table"><thead><tr>';
            res.headers.forEach(h => html += `<th>${h}</th>`);
            html += '<th>操作</th></tr></thead><tbody>';
            
            res.data.forEach(r => {
                const isTransfer = String(r[9] || "").trim() !== ""; const isCheckIn = String(r[7] || "").trim() !== "" && String(r[7] || "").trim() !== "0";
                html += `<tr class="${isTransfer ? 'transfer-row' : ''}">`;
                r.forEach((v, i) => {
                    const isNoWrap = [0, 1, 2].includes(i) ? 'nowrap-col' : '';
                    const isCompact = (i === 4) ? 'compact-col' : '';
                    if ([1,2,3,4,5,6,9].includes(i)) {
                        html += `<td class="editable ${isNoWrap} ${isCompact}"><span>${v}</span><input type="text" value="${v}" style="display:none;"></td>`;
                    } else {
                        html += `<td class="${isNoWrap} ${isCompact}">${v}</td>`;
                    }
                });
                
                html += `<td>
                    <div class="action-stack">
                        <button class="btn btn-outline-secondary btn-stack" onclick="toggleEdit(this, 'student')">修正</button>
                        <button class="btn ${isCheckIn ? 'btn-secondary' : 'btn-success'} btn-stack" onclick="checkIn('${r[0]}', true)" ${isCheckIn ? 'disabled' : ''}>報到</button>
                        <button class="btn btn-outline-danger btn-stack" onclick="checkIn('${r[0]}', false)" ${!isCheckIn ? 'disabled' : ''}>取消</button>
                    </div>
                </td></tr>`;
            });
            $('#result-area').html(html + '</tbody></table>');
        }

        // --- 匯入邏輯 ---
        function openImportModal(type) { 
            currentImportType = type; const container = $('#header-tags-container'); container.empty();
            let h = type === 'student' ? ['臨時編班', '身分證字號', '姓名', '性別', '畢業國小', '電話 1', '電話 2'] : ['姓名', '性別', '身分證'];
            $('#import-title').text(type === 'student' ? '📥 匯入新生基本資料' : '🏀 匯入體育班名單');
            h.forEach(tag => container.append(`<span class="header-tag">${tag}</span>`));
            resetImport(); $('#importModal').css('display','flex'); 
        }
        function resetImport() { stagedData = []; $('#paste-area, #file-input').val(''); $('#preview-section').hide(); $('#import-confirm-btn').prop('disabled', true); $('#drop-zone').html('<div class="mb-2">📄 點擊或將 Excel 檔案拖曳至此</div>'); }
        function handleFileSelect(input) {
            const f = input.files[0]; if(!f) return;
            $('#drop-zone').html(`已選取：<strong>${f.name}</strong>`);
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                if(rows.length > 0) { stagedData = rows.slice(1); renderPreview(rows[0], stagedData); }
            };
            reader.readAsArrayBuffer(f);
        }
        function parsePasteData() { const t = $('#paste-area').val().trim(); if(!t) return $('#preview-section').hide(); const rows = t.split('\n').map(r => r.split('\t')); if(rows.length > 0) { stagedData = rows.slice(1); renderPreview(rows[0], stagedData); } }
        function renderPreview(h, d) { $('#preview-thead').html('<tr>' + h.map(tag => `<th>${tag}</th>`).join('') + '</tr>'); $('#preview-tbody').html(d.slice(0, 10).map(r => '<tr>' + r.map(c => `<td>${c||''}</td>`).join('') + '</tr>').join('')); $('#import-count').text(`共 ${d.length} 筆`); $('#preview-section').show(); $('#import-confirm-btn').prop('disabled', d.length === 0); }
        async function processImport() {
            if(!stagedData.length) return; showToast("資料上傳中...", "var(--primary)"); $('#import-confirm-btn').prop('disabled', true).text("寫入中...");
            try {
                const res = await fetch(DEPLOY_URL, { method: "POST", body: JSON.stringify({ action: currentImportType === 'student' ? "importStudentData" : "importSportsData", token: sessionToken, data: { rows: stagedData, mode: 'overwrite' } }) });
                const result = await res.json(); showToast(result.message, result.status === 'success' ? "var(--success)" : "var(--danger)");
                if(result.status === 'success') { $('#importModal').hide(); loadStats(); }
            } catch(e) { showToast("連線異常", "var(--danger)"); }
            $('#import-confirm-btn').prop('disabled', false).text("🚀 確認並覆蓋資料庫");
        }

        // --- 帳號與其他管理 ---
        async function loadWhitelist() {
            $('#whitelist-area').html('<p class="text-center py-4">讀取中...</p>');
            const res = await apiFetch('getWhitelist', {});
            if(res.status !== 'success') return $('#whitelist-area').html('<p class="text-center py-4 text-danger">讀取失敗</p>');
            let html = '<table class="data-table"><thead><tr><th>授權 Google Email</th><th>操作</th></tr></thead><tbody>';
            res.data.forEach((email, idx) => { if(idx === 0) return; html += `<tr><td class="editable"><span>${email}</span><input type="text" value="${email}" style="display:none;"></td><td><button class="btn btn-sm btn-outline-secondary px-3" onclick="toggleEdit(this, 'whitelist', '${email}')">修正</button> <button class="btn btn-sm btn-outline-danger px-3" onclick="deleteWhitelistAccount('${email}')">移除</button></td></tr>`; });
            $('#whitelist-area').html(html + '</tbody></table>');
        }
        async function saveWhitelistAccount() { const e = $('#new-whitelist-email').val().trim(); if(!e) return; const res = await apiFetch('addWhitelist', e); showToast(res.message, res.status === 'success' ? "var(--success)" : "var(--danger)"); if(res.status === 'success') { $('#new-whitelist-email').val(''); loadWhitelist(); } }
        async function deleteWhitelistAccount(e) { if(!confirm(`確定移除 ${e} 嗎？`)) return; const res = await apiFetch('deleteWhitelist', e); showToast(res.message, "var(--danger)"); if(res.status === 'success') loadWhitelist(); }

        async function toggleEdit(btn, type, originalValue) {
            const tr = btn.closest("tr"); const editables = tr.querySelectorAll(".editable");
            if (btn.innerText !== "儲存") {
                btn.innerText = "儲存"; btn.classList.replace("btn-outline-secondary", "btn-warning"); tr.classList.add("editing-row");
                editables.forEach(td => { td.querySelector("span").style.display="none"; td.querySelector("input").style.display="block"; });
            } else {
                btn.disabled = true; let res;
                if (type === 'student') { const rowData = Array.from(tr.cells).slice(0, -1).map(td => td.querySelector("input")?.value.trim() || td.innerText); res = await apiFetch('updateStudentData', rowData); }
                else { res = await apiFetch('updateWhitelist', { oldEmail: originalValue, newEmail: tr.querySelector("input").value.trim() }); }
                showToast(res.message, res.status === 'success' ? "var(--success)" : "var(--danger)");
                btn.disabled = false; btn.innerText = "修正"; btn.classList.replace("btn-warning", "btn-outline-secondary"); tr.classList.remove("editing-row");
                if (res.status === 'success') { if(type === 'whitelist') loadWhitelist(); else searchData(); }
            }
        }
        async function checkIn(id, status) { const res = await apiFetch(status ? 'submitCheckIn' : 'cancelCheckIn', id); showToast(res.message, status ? "var(--success)" : "var(--danger)"); searchData(); loadStats(); }
        async function saveNewStudent() {
            const data = { nT: $('#nT').val().trim(), nI: $('#nI').val().trim(), nN: $('#nN').val().trim(), nG: $('#nG').val(), nS: $('#nS').val().trim(), nP1: $('#nP1').val().trim(), nP2: $('#nP2').val().trim() };
            if(!data.nT || !data.nN) return alert("臨時編號與姓名為必填欄位");
            const res = await apiFetch('addNewStudent', data);
            showToast(res.message, res.status === 'success' ? "var(--success)" : "var(--danger)");
            if(res.status === 'success') { $('#addModal').hide(); searchData(); loadStats(); }
        }
        async function systemReset() { const res = await apiFetch('clearAllData', {}); showToast(res.message, "var(--danger)"); $('#resetModal').hide(); loadStats(); clearFields(); }

        function showToast(text, color) { $('#toast-msg').text(text).css('background', color).stop().fadeIn(200).delay(2500).fadeOut(300); }
        function switchTab(tab, el) { $('.mobile-page').removeClass('active'); $(`#page-${tab}`).addClass('active'); $('.nav-item').removeClass('active'); $(el).addClass('active'); if(tab === 'accounts') loadWhitelist(); }

        window.onload = async () => { if (sessionToken) { $('#login-overlay').hide(); $('#main-app').show(); initApp(); } $('.nav-tabs a').on('click', function (e) { e.preventDefault(); $(this).tab('show'); }); };
    </script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.bundle.min.js"></script>
</body>
