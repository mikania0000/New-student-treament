<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鳳甲國中報到管理系統</title>
    <!-- 引入外部資源 -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        :root {
            --primary: #007BFF;
            --bg: #f4f7f9;
            --text: #333;
            --accent: #FF69B4;
            --success: #28a745;
            --danger: #D32F2F;
            --warning: #FFA500;
        }

        body {
            background-color: var(--bg);
            font-family: "Microsoft JhengHei", sans-serif;
            color: var(--text);
            margin: 0; padding-bottom: 80px;
        }

        /* --- 登入畫面樣式 (簡潔低調) --- */
        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            z-index: 99999; display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center;
            width: 90%; max-width: 380px;
        }
        .login-box h4 { color: #444; font-weight: bold; margin-bottom: 5px; }
        .login-box p { color: #888; font-size: 14px; margin-bottom: 25px; }

        .auth-section {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 120px;
        }

        /* --- 主程式區域 --- */
        #main-app { display: none; }
        .app-container { max-width: 98%; margin: 20px auto; padding: 0 15px; }
        .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 20px; border: none; }
        .header-row { display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); padding-left: 15px; margin-bottom: 15px; }
        
        /* 搜尋條件網格 */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .form-grid label { font-weight: bold; color: #555; margin-bottom: 5px; font-size: 13px; }
        
        /* 按鈕群組 */
        .btn-group-custom { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .btn-custom { padding: 8px 16px; border-radius: 6px; border: none; color: white; font-weight: normal; cursor: pointer; transition: 0.2s; white-space: nowrap; font-size: 14px;}
        .btn-custom:hover { opacity: 0.9; }

        /* --- 查詢結果表格 --- */
        .table-wrapper { width: 100%; overflow-x: auto; border-radius: 6px; border: 1px solid #dee2e6; background: #fff; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 14px; margin: 0; table-layout: auto; }
        .data-table th { background: #f8f9fa; color: #333; padding: 10px 5px; text-align: center; white-space: nowrap; border: 1px solid #dee2e6; font-weight: bold; }
        .data-table td { padding: 8px 5px; border: 1px solid #dee2e6; text-align: center; vertical-align: middle; word-break: break-word; }
        .data-table tbody tr:hover { background-color: #f4f8ff; }
        
        .transfer-row { background-color: #fff0f4 !important; color: #d63384 !important; }
        .editable input { width: 100%; padding: 4px; font-size: 13px; text-align: center; border: 1px solid #aaa; border-radius: 4px; box-sizing: border-box; }
        .editing-row { background-color: #fff3cd !important; }

        /* --- 即時統計表格 --- */
        .stats-wrapper { border-radius: 6px; border: 1px solid #dee2e6; overflow: hidden; background: white; }
        .stats-table { width: 100%; border-collapse: collapse; font-size: 14px; margin: 0; }
        .stats-table td { padding: 8px; border-bottom: 1px solid #dee2e6; vertical-align: middle; }
        .stats-table tr:last-child td { border-bottom: none; }
        .stats-table td:first-child { width: 55%; color: #666; border-right: 1px solid #dee2e6; }
        .stats-table td.val-col { text-align: right; font-weight: bold; color: #333; }
        .stats-table .highlight-row td { color: var(--primary); font-weight: bold; background-color: #f8f9fa; }

        /* --- 提示訊息與彈窗 --- */
        #toast-msg {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 10px 25px; border-radius: 30px; color: white;
            z-index: 100000; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.15); font-size: 14px;
        }
        
        .modal-custom { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 25px; border-radius: 10px; width: 90%; max-width: 550px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .modal-box h5 { color: #333; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }

        /* --- 手機版導覽 --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60px;
            background: white; border-top: 1px solid #ddd; display: none;
            justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { color: #666; text-decoration: none !important; font-size: 14px; text-align: center; flex: 1; padding: 10px 0; }
        .nav-item.active { color: var(--primary); font-weight: bold; background: #f0f7ff; }

        @media (max-width: 991px) {
            .bottom-nav { display: flex; }
            .page { display: none; }
            .page.active { display: block; }
        }
    </style>
</head>
<body>

    <!-- 簡潔登入畫面 -->
    <div id="login-overlay" class="login-overlay">
        <div class="login-box">
            <h4>系統登入</h4>
            <p>鳳甲國中報到管理系統</p>
            
            <div class="auth-section">
                <!-- Google 登入按鈕容器 -->
                <div id="g_id_onload"
                    data-client_id="553016940521-araovlp30ctbqn6um5rr49q3es5jm4jg.apps.googleusercontent.com"
                    data-callback="onGoogleSignIn"
                    data-auto_prompt="false">
                </div>
                <div id="g-btn-wrapper">
                    <div class="g_id_signin" data-type="standard" data-theme="outline" data-size="large" data-width="300"></div>
                </div>
                
                <!-- 驗證中狀態 -->
                <div id="loading-msg" style="display: none; color: var(--primary); font-size: 14px; margin-top: 15px;">
                    <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                    正在驗證授權，請稍候...
                </div>
                <!-- 錯誤訊息 -->
                <div id="login-msg" style="display: none; margin-top: 15px; color: var(--danger); font-size: 13px; padding: 8px; background: #fdf2f2; border-radius: 6px;"></div>
            </div>
        </div>
    </div>

    <!-- 訊息提示 -->
    <div id="toast-msg"></div>

    <!-- 主程式區域 -->
    <div id="main-app">
        <div class="app-container">
            <div class="row">
                <!-- 左側：管理與查詢 -->
                <div id="page-home" class="col-lg-9 page active">
                    <div class="card">
                        <div class="header-row">
                            <h5 class="m-0 text-secondary font-weight-bold">報到管理作業</h5>
                            <div>
                                <span id="user-display" class="text-muted small mr-3"></span>
                                <button class="btn btn-outline-secondary btn-sm" onclick="logout()">安全登出</button>
                            </div>
                        </div>
                        
                        <!-- 搜尋欄位 -->
                        <div class="form-grid">
                            <div><label>臨時編號</label><input type="text" id="q-id" class="form-control form-control-sm" placeholder="輸入編號"></div>
                            <div><label>身分證號</label><input type="text" id="q-idnum" class="form-control form-control-sm" placeholder="輸入證號"></div>
                            <div><label>學生姓名</label><input type="text" id="q-name" class="form-control form-control-sm" placeholder="輸入姓名"></div>
                            <div><label>畢業國小</label><select id="q-school" class="form-control form-control-sm"><option value="">全部國小</option></select></div>
                            <div>
                                <label>報到狀態</label>
                                <select id="q-status" class="form-control form-control-sm">
                                    <option value="">全部狀態</option>
                                    <option value="已報到">已報到</option>
                                    <option value="未報到">未報到</option>
                                </select>
                            </div>
                        </div>

                        <!-- 操作按鈕群組 -->
                        <div class="btn-group-custom">
                            <button class="btn-custom" style="background: var(--primary);" onclick="searchData()">查詢</button>
                            <button class="btn-custom" style="background: #20c997;" onclick="$('#addModal').css('display','flex')">新增</button>
                            <button class="btn-custom" style="background: #6c757d;" onclick="openImportModal('student')">匯入名單</button>
                            <button class="btn-custom" style="background: #e83e8c;" onclick="openImportModal('sports')">匯入體育班</button>
                            <button class="btn-custom" style="background: #adb5bd;" onclick="clearFields()">清除</button>
                            <button class="btn-custom ml-auto" style="background: var(--danger);" onclick="$('#resetModal').css('display','flex')">重置系統</button>
                        </div>
                    </div>

                    <div class="card">
                        <div id="result-area" class="table-wrapper">
                            <p class="text-center py-4 text-muted small">請輸入條件後點擊「查詢」</p>
                        </div>
                    </div>
                </div>

                <!-- 右側：統計看板 -->
                <div id="page-stats" class="col-lg-3 page">
                    <div class="card">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h6 class="m-0 font-weight-bold text-secondary">系統統計</h6>
                            <button class="btn btn-sm btn-light border" onclick="loadStats()" style="font-size:12px;">↻ 刷新</button>
                        </div>
                        <div id="stats-area">
                            <p class="text-center py-4 text-muted small">載入中...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 手機版導覽列 -->
        <div class="bottom-nav">
            <a href="javascript:void(0)" class="nav-item active" onclick="switchTab('home', this)">管理作業</a>
            <a href="javascript:void(0)" class="nav-item" onclick="switchTab('stats', this)">系統統計</a>
        </div>
    </div>

    <!-- ================= 彈窗區 ================= -->
    <div id="addModal" class="modal-custom">
        <div class="modal-box">
            <h5>手動新增</h5>
            <div class="row">
                <div class="col-6 form-group"><label class="small text-muted">臨時編號 *</label><input type="text" id="nT" class="form-control form-control-sm"></div>
                <div class="col-6 form-group"><label class="small text-muted">身分證號</label><input type="text" id="nI" class="form-control form-control-sm"></div>
                <div class="col-6 form-group"><label class="small text-muted">姓名 *</label><input type="text" id="nN" class="form-control form-control-sm"></div>
                <div class="col-6 form-group"><label class="small text-muted">性別</label><select id="nG" class="form-control form-control-sm"><option value="男">男</option><option value="女">女</option></select></div>
                <div class="col-12 form-group"><label class="small text-muted">畢業國小</label><input type="text" id="nS" class="form-control form-control-sm"></div>
                <div class="col-6 form-group"><label class="small text-muted">電話 1</label><input type="text" id="nP1" class="form-control form-control-sm"></div>
                <div class="col-6 form-group"><label class="small text-muted">電話 2</label><input type="text" id="nP2" class="form-control form-control-sm"></div>
            </div>
            <div class="d-flex mt-2" style="gap: 10px;">
                <button class="btn btn-primary btn-sm flex-grow-1" onclick="saveNewStudent()">儲存</button>
                <button class="btn btn-light btn-sm flex-grow-1 border" onclick="$('#addModal').hide()">取消</button>
            </div>
        </div>
    </div>

    <div id="importModal" class="modal-custom">
        <div class="modal-box">
            <h5 id="import-title">資料匯入</h5>
            <p class="text-muted" style="font-size:12px;">請從 Excel 複製含標題列的資料貼於下方：</p>
            <textarea id="paste-area" class="form-control mb-3" style="height: 150px; font-size: 12px; white-space: pre; overflow-wrap: normal; overflow-x: auto;"></textarea>
            <div class="d-flex" style="gap: 10px;">
                <button class="btn btn-primary btn-sm flex-grow-1" onclick="processImport()">確認覆蓋匯入</button>
                <button class="btn btn-light btn-sm flex-grow-1 border" onclick="$('#importModal').hide()">取消</button>
            </div>
        </div>
    </div>

    <div id="resetModal" class="modal-custom">
        <div class="modal-box text-center">
            <h5 class="text-danger mb-3">資料清空確認</h5>
            <p class="text-muted" style="font-size:13px;">將清空所有學生資料與報到紀錄，無法復原。<br>確認要繼續嗎？</p>
            <div class="d-flex mt-4" style="gap: 10px;">
                <button class="btn btn-danger btn-sm flex-grow-1" onclick="systemReset()">確認清空</button>
                <button class="btn btn-light btn-sm flex-grow-1 border" onclick="$('#resetModal').hide()">取消</button>
            </div>
        </div>
    </div>

    <!-- ================= 腳本區 ================= -->
    <script>
        // ★ 請替換成您最新的 GAS 部署網址 ★
        const DEPLOY_URL = "https://script.google.com/macros/s/AKfycbxpY4iHHkEkdNsBvLdb2OJPqzn0eY14CWjLRiEoDJ0IBUhucE2Pp5dJepyZR5AxP_LO/exec";
        
        // 儲存從後端取得的安全憑證
        let sessionToken = sessionStorage.getItem('fjm_token') || "";
        let currentImportType = 'student';

        // 1. Google 登入回傳處理
        async function onGoogleSignIn(response) {
            const jwtCredential = response.credential;
            
            $('#g-btn-wrapper').hide();
            $('#login-msg').hide();
            $('#loading-msg').show();

            try {
                // 將 JWT 傳給後端驗證，不送任何密碼
                const res = await apiFetch('login', { credential: jwtCredential });
                
                if (res.status === 'success') {
                    // 登入成功，儲存後端發放的 Session Token
                    sessionToken = res.token;
                    sessionStorage.setItem('fjm_token', sessionToken);
                    $('#user-display').text(res.email);
                    
                    $('#login-overlay').fadeOut();
                    $('#main-app').fadeIn();
                    initApp();
                } else {
                    showLoginError(res.message || "驗證失敗，請聯絡管理員確認權限。");
                }
            } catch (e) {
                showLoginError("伺服器連線異常，請稍後再試。");
            }
        }

        function showLoginError(msg) {
            $('#loading-msg').hide();
            $('#g-btn-wrapper').show();
            $('#login-msg').text(msg).show();
            // 登出 Google 帳號以允許重新選擇
            if (google && google.accounts && google.accounts.id) {
                google.accounts.id.disableAutoSelect();
            }
        }

        function initApp() {
            loadSchools();
            loadStats();
            // 每分鐘自動刷新統計
            setInterval(loadStats, 60000); 
        }

        // 安全登出：主動通知後端銷毀 Token
        async function logout() {
            if (sessionToken) {
                try {
                    await apiFetch('logout', {});
                } catch (e) {
                    console.log("後端連線異常，但仍會執行本地登出");
                }
            }

            sessionStorage.removeItem('fjm_token');
            sessionToken = "";

            if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
                google.accounts.id.disableAutoSelect();
            }

            location.reload();
        }

        // 核心 API 呼叫函數 (使用 JSONP 解決跨域 GET，並帶上 Token)
        function apiFetch(action, data) {
            const callback = 'cb_' + Math.floor(Math.random() * 1000000);
            return new Promise((resolve) => {
                window[callback] = (res) => { 
                    resolve(res); 
                    delete window[callback]; 
                    $(`#${callback}`).remove(); 
                    // 如果後端回傳 token 過期，自動登出
                    if(res && res.status === 'unauthorized') {
                        alert('登入時效已過，請重新登入。');
                        logout();
                    }
                };
                const script = document.createElement('script');
                script.id = callback;
                const encodedData = encodeURIComponent(JSON.stringify(data));
                script.src = `${DEPLOY_URL}?action=${action}&token=${sessionToken}&callback=${callback}&data=${encodedData}&v=${Date.now()}`;
                document.body.appendChild(script);
            });
        }

        async function loadSchools() {
            const res = await apiFetch('getPrimarySchools', {});
            if(res.status === 'success' && Array.isArray(res.data)) {
                $('#q-school').html('<option value="">全部國小</option>'); // 清空並重設預設值
                res.data.forEach(s => $('#q-school').append(`<option value="${s}">${s}</option>`));
            }
        }

        async function loadStats() {
            const res = await apiFetch('getStatisticsData', {});
            if(res.status !== 'success') return;
            
            const data = res.data;
            let html = '<div class="stats-wrapper"><table class="stats-table"><tbody>';
            data.forEach((r, i) => {
                const isHeader = i < 2;
                let rowClass = isHeader ? 'highlight-row' : '';
                let val = r[1];
                html += `<tr class="${rowClass}">
                            <td>${r[0]}</td>
                            <td class="val-col">${val}</td>
                         </tr>`;
            });
            html += '</tbody></table></div>';
            $('#stats-area').html(html);
        }

        function clearFields() {
            $('#q-id, #q-idnum, #q-name, #q-school, #q-status').val('');
            $('#result-area').html('<p class="text-center py-4 text-muted small">欄位已清空</p>');
        }

        async function searchData() {
            const filter = { 
                tempId: $('#q-id').val().trim(), 
                idNumber: $('#q-idnum').val().trim(),
                studentName: $('#q-name').val().trim(),
                primarySchool: $('#q-school').val(),
                reportStatus: $('#q-status').val()
            };
            
            $('#result-area').html('<p class="text-center py-4"><span class="spinner-border spinner-border-sm text-primary"></span></p>');
            
            const res = await apiFetch('queryStudentData', filter);
            if(res.status !== 'success' || !res.data || res.data.length === 0) {
                return $('#result-area').html('<p class="text-center py-4 text-danger small">查無資料</p>');
            }

            let html = '<table class="data-table"><thead><tr>';
            res.headers.forEach(h => html += `<th>${h}</th>`);
            html += '<th>操作</th></tr></thead><tbody>';
            
            res.data.forEach(r => {
                const isTransfer = String(r[9] || "").trim() !== ""; 
                const isCheckIn = String(r[7] || "").trim() !== "" && String(r[7] || "").trim() !== "0"; 
                
                html += `<tr class="${isTransfer ? 'transfer-row' : ''}">`;
                r.forEach((v, i) => {
                    const isEditable = [1, 2, 3, 4, 5, 6, 9].includes(i);
                    if (isEditable) {
                        html += `<td class="editable">
                                    <span>${v}</span>
                                    <input type="text" value="${v}" style="display:none;">
                                 </td>`;
                    } else {
                        html += `<td>${v}</td>`;
                    }
                });
                
                html += `<td style="white-space: nowrap;">
                    <button class="btn btn-sm btn-outline-secondary px-2 py-0" style="font-size:12px;" onclick="toggleEdit(this)">修正</button>
                    <button class="btn btn-sm ${isCheckIn ? 'btn-secondary' : 'btn-success'} px-2 py-0" style="font-size:12px;" onclick="checkIn('${r[0]}', true)" ${isCheckIn ? 'disabled' : ''}>報到</button>
                    <button class="btn btn-sm btn-outline-danger px-2 py-0" style="font-size:12px;" onclick="checkIn('${r[0]}', false)" ${!isCheckIn ? 'disabled' : ''}>取消</button>
                </td></tr>`;
            });
            
            $('#result-area').html(html + '</tbody></table>');
        }

        async function toggleEdit(btn) {
            const tr = btn.closest("tr");
            const editables = tr.querySelectorAll(".editable");
            const isSaving = btn.innerText === "儲存";
            
            if (!isSaving) {
                btn.innerText = "儲存";
                btn.classList.replace("btn-outline-secondary", "btn-warning");
                btn.classList.remove("btn-outline-secondary");
                tr.classList.add("editing-row");
                
                editables.forEach(td => {
                    td.querySelector("span").style.display = "none";
                    td.querySelector("input").style.display = "block";
                });
            } else {
                btn.disabled = true;
                btn.innerText = "處理中";
                
                const rowData = Array.from(tr.cells).slice(0, -1).map(td => {
                    const input = td.querySelector("input");
                    return (input && input.style.display !== 'none') ? input.value.trim() : (td.querySelector("span") ? td.querySelector("span").innerText : td.innerText);
                });
                
                try {
                    const res = await apiFetch('updateStudentData', rowData);
                    showToast(res.message, res.status === 'success' ? "var(--success)" : "var(--danger)");
                    
                    btn.disabled = false;
                    btn.innerText = "修正";
                    btn.classList.replace("btn-warning", "btn-outline-secondary");
                    btn.classList.add("btn-outline-secondary");
                    tr.classList.remove("editing-row");
                    
                    if (res.status === 'success') {
                        editables.forEach(td => {
                            const inp = td.querySelector("input");
                            td.querySelector("span").innerText = inp.value;
                            td.querySelector("span").style.display = "inline";
                            inp.style.display = "none";
                        });
                        if (rowData[9] !== "") tr.classList.add("transfer-row");
                        else tr.classList.remove("transfer-row");
                        loadStats(); 
                    }
                } catch(e) {
                    showToast("存檔失敗", "var(--danger)");
                    btn.disabled = false;
                    btn.innerText = "儲存";
                }
            }
        }

        async function checkIn(id, status) {
            showToast("處理中...", "var(--primary)");
            const res = await apiFetch(status ? 'submitCheckIn' : 'cancelCheckIn', id);
            showToast(res.message, res.status === 'success' ? "var(--success)" : "var(--danger)");
            searchData(); 
            loadStats();  
        }

        async function saveNewStudent() {
            const data = { 
                nT: $('#nT').val().trim(), nI: $('#nI').val().trim(), nN: $('#nN').val().trim(), 
                nG: $('#nG').val(), nS: $('#nS').val().trim(), nP1: $('#nP1').val().trim(), nP2: $('#nP2').val().trim() 
            };
            if(!data.nT || !data.nN) return alert("編號與姓名不可空白");
            
            const res = await apiFetch('addNewStudent', data);
            showToast(res.message, res.status === 'success' ? "var(--success)" : "var(--danger)");
            if(res.status === 'success') {
                $('#addModal').hide();
                $('#nT, #nI, #nN, #nS, #nP1, #nP2').val('');
                $('#q-id').val(data.nT); 
                searchData(); 
                loadStats();
            }
        }

        function openImportModal(type) { 
            currentImportType = type;
            $('#import-title').text(type === 'student' ? '匯入學生資料' : '匯入體育班');
            $('#paste-area').val(''); 
            $('#importModal').css('display','flex'); 
        }

        async function processImport() {
            const text = $('#paste-area').val().trim();
            if(!text) return showToast("請貼上資料", "var(--warning)");
            
            const rows = text.split('\n').map(r => r.split('\t'));
            const actionName = currentImportType === 'student' ? "importStudentData" : "importSportsData";
            
            showToast("上傳中...", "var(--primary)");
            
            try {
                const res = await fetch(DEPLOY_URL, { 
                    method: "POST", 
                    body: JSON.stringify({ 
                        action: actionName, 
                        token: sessionToken, 
                        data: { rows: rows.slice(1), mode: 'overwrite' } 
                    }) 
                });
                const result = await res.json();
                showToast(result.message, result.status === 'success' ? "var(--success)" : "var(--danger)");
                if(result.status === 'success') {
                    $('#importModal').hide(); 
                    loadStats();
                } else if (result.status === 'unauthorized') {
                    logout();
                }
            } catch(e) { 
                showToast("連線異常", "var(--danger)"); 
            }
        }

        async function systemReset() {
            const res = await apiFetch('clearAllData', {});
            showToast(res.message, res.status === 'success' ? "var(--danger)" : "var(--warning)");
            $('#resetModal').hide(); 
            loadStats();
            clearFields();
        }

        function showToast(text, color) { 
            $('#toast-msg').text(text).css('background', color).fadeIn(200).delay(2500).fadeOut(300); 
        }

        function switchTab(tab, el) {
            $('.page').removeClass('active');
            $(`#page-${tab}`).addClass('active');
            $('.nav-item').removeClass('active');
            $(el).addClass('active');
        }

        // 頁面載入時檢查是否有未過期的 Token
        window.onload = async () => {
            if (sessionToken) {
                $('#login-overlay').fadeOut(0);
                $('#main-app').fadeIn(0);
                // 嘗試載入資料，如果 Token 已經在後端過期，apiFetch 會自動觸發登出
                initApp();
            }
        };
    </script>
</body>
</html>
