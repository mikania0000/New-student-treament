<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鳳甲國中新生報到管理系統</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #007BFF; --secondary: #E9F2FF; --accent: #FF69B4; --warning: #FFA500;
      --danger: #D32F2F; --success: #28a745; --bg: #f4f7f9; --text: #333; --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
      --font-main-title: 50px; --font-content: 20px; --font-sub-title: 32px; --font-version: 14px;
    }
    * { box-sizing: border-box; }
    body { font-family: "Microsoft JhengHei", Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; font-size: var(--font-content); line-height: 1.6; overflow-x: hidden; }
    
    .app-container { 
      max-width: 98%; 
      margin: 20px auto; 
      display: grid; 
      /* ★★★ 這裡控制統計表寬度 (目前 380px)，修改這個數字即可調整 ★★★ */
      grid-template-columns: 1fr 400px; 
      gap: 25px; 
      padding: 0 20px; 
    }

    @media (min-width: 851px) {
      .main-content { display: contents; }
      .form-card { grid-column: 1 / 2; grid-row: 1; }
      .side-content { grid-column: 2 / 3; grid-row: 1; }
      .result-card { grid-column: 1 / -1; grid-row: 2; }
    }
    @media (max-width: 850px) {
      .app-container { display: flex; width: 100vw; height: 100vh; overflow-x: auto; scroll-snap-type: x mandatory; padding: 0; margin: 0; gap: 0; }
      .main-content, .side-content { flex: 0 0 100vw; width: 100vw; height: 100vh; overflow-y: auto; scroll-snap-align: start; padding: 20px; display: block; }
      h2 { font-size: 36px !important; }
      .scroll-hint { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: white; padding: 8px 18px; border-radius: 25px; font-size: 14px; z-index: 1000; }
    }
    @media (min-width: 851px) { .scroll-hint { display: none; } }

    .card { background: #fff; border-radius: 12px; box-shadow: var(--shadow); padding: 30px; margin-bottom: 20px; border: 3px dashed transparent; transition: 0.3s; position: relative; }
    .card.dragover { border-color: var(--primary); background: #f0f8ff; transform: scale(1.01); }
    .drag-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; justify-content: center; align-items: center; font-size: 30px; color: var(--primary); font-weight: bold; border-radius: 12px; pointer-events: none; }
    .card.dragover .drag-overlay { display: flex; }

    h2 { margin-top: 0; color: var(--primary); border-left: 10px solid var(--primary); padding-left: 20px; font-size: var(--font-main-title); line-height: 1.2; margin-bottom: 5px; }
    .version-tag { font-size: var(--font-version); color: #999; margin-bottom: 20px; margin-left: 32px; font-weight: normal; }
    h3 { margin-top: 0; color: var(--primary); border-left: 6px solid var(--primary); padding-left: 15px; font-size: var(--font-sub-title); margin-bottom: 15px; }

    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 25px; }
    .form-group label { display: block; font-weight: bold; margin-bottom: 6px; }
    input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: var(--font-content); }

    .btn-group { display: flex; flex-wrap: wrap; gap: 12px; }
    button { padding: 12px 24px; border: none; border-radius: 8px; font-size: var(--font-content); font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
    .btn-search { background: var(--primary); } .btn-add { background: var(--accent); } .btn-checkin { background: var(--warning); }
    .btn-cancel { background: var(--danger); } .btn-import { background: #483D8B; } .btn-reset { background: #8B0000; } .btn-clear { background: #6c757d; }

    .stats-table { width: 100%; border-collapse: collapse; font-size: var(--font-content); }
    .stats-table th, .stats-table td { padding: 3.6px 14px; border: 1px solid #eef2f7; text-align: left; }
    .stats-header { background: var(--primary); color: white; }
    .highlight-pink { background: #fff0f5; }

    .result-container { overflow-x: auto; margin-top: 20px; }
    .data-table { width: 100%; border-collapse: collapse; min-width: 1000px; font-size: var(--font-content); }
    .data-table th { background: var(--primary); color: white; padding: 15px; }
    .data-table td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
    .data-table tr:hover { background: var(--secondary); }
    .editable input { width: 100%; padding: 5px; font-size: var(--font-content); text-align: center; }

    #statusMessage { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); padding: 15px 30px; border-radius: 50px; color: white; font-weight: bold; z-index: 3000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 2000; }
    .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 550px; }
  </style>
</head>
<body>

<div id="statusMessage"></div>
<div class="scroll-hint">⬅️ 左右滑動：切換「操作區」與「統計看板」 ➡️</div>

<div class="app-container">
  <div class="main-content">
    <!-- 拖曳區卡片 -->
    <div class="card form-card" id="dropCard">
      <div class="drag-overlay">📂 放開滑鼠以匯入 Excel</div>
      <h2>鳳甲國中報到管理系統</h2>
      <div class="version-tag">版本：v2026.01.26.5</div>
      
      <div class="form-grid">
        <div class="form-group"><label>臨時編號</label><input type="text" id="tempId" placeholder="輸入臨時編號"></div>
        <div class="form-group"><label>身分證號</label><input type="text" id="idNumber" placeholder="輸入證號"></div>
        <div class="form-group"><label>學生姓名</label><input type="text" id="studentName" placeholder="輸入姓名"></div>
        <div class="form-group"><label>畢業國小</label><select id="primarySchool"><option value="">全部國小</option></select></div>
        <div class="form-group"><label>報到狀態</label><select id="reportStatus"><option value="">全部</option><option value="已報到">已報到</option><option value="未報到">未報到</option></select></div>
      </div>
      
      <div class="btn-group">
        <button id="searchBtn" class="btn-search">🔍 查詢</button>
        <button id="addBtn" class="btn-add">➕ 新增新生</button>
        <button id="checkinBtn" class="btn-checkin">✅ 報到</button>
        <button id="cancelCheckinBtn" class="btn-cancel">❌ 取消報到</button>
        <button id="importBtn" class="btn-import">📥 匯入 Excel</button>
        <button id="resetBtn" class="btn-reset">🗑️ 系統重設</button>
        <button id="clearBtn" class="btn-clear">🧹 清除欄位</button>
      </div>
      <p style="font-size: 16px; color: #666; margin-top: 15px; font-weight: bold;">💡 拖曳 Excel 檔案至此卡片範圍即可自動匯入</p>
      <input type="file" id="fileInput" style="display:none;" accept=".xlsx,.xls">
    </div>

    <div class="card result-card">
      <h3>查詢結果</h3>
      <div id="resultArea" class="result-container"><p style="text-align: center; color: #999;">請輸入條件並執行查詢...</p></div>
    </div>
  </div>

  <div class="side-content">
    <div class="card">
      <h3>📊 即時統計看板</h3>
      <div id="statsArea"><p style="text-align: center;">連線中...</p></div>
    </div>
  </div>
</div>

<!-- 彈窗 -->
<div id="addModal" class="modal">
  <div class="modal-content">
    <h3>手動新增學生</h3>
    <div class="form-grid" style="grid-template-columns: 1fr;">
      <input type="text" id="nT" placeholder="臨時編號 *">
      <input type="text" id="nI" placeholder="身分證號 *">
      <input type="text" id="nN" placeholder="姓名 *">
      <select id="nG"><option value="男">男</option><option value="女">女</option></select>
      <input type="text" id="nS" placeholder="畢業國小 *">
      <input type="text" id="nP1" placeholder="電話 1">
      <input type="text" id="nP2" placeholder="電話 2">
    </div>
    <div class="btn-group" style="justify-content: flex-end; margin-top: 15px;">
      <button onclick="saveStudent()" class="btn-search">確認存檔</button>
      <button onclick="closeModal('addModal')" class="btn-clear">關閉</button>
    </div>
  </div>
</div>

<div id="pwdModal" class="modal">
  <div class="modal-content" style="max-width: 400px;">
    <h3>系統重設確認</h3>
    <p>請輸入管理密碼：</p>
    <input type="password" id="sysPwd" placeholder="密碼" style="margin-bottom: 20px;">
    <div class="btn-group" style="justify-content: flex-end;">
      <button onclick="doReset()" class="btn-reset">確認清空</button>
      <button onclick="closeModal('pwdModal')" class="btn-clear">取消</button>
    </div>
  </div>
</div>

<script>
  const DEPLOY_ID = "AKfycbxpY4iHHkEkdNsBvLdb2OJPqzn0eY14CWjLRiEoDJ0IBUhucE2Pp5dJepyZR5AxP_LO";
  const DEPLOY_URL = `https://script.google.com/macros/s/${DEPLOY_ID}/exec`;

  function callGAS(func, params, cb) {
    const cbName = 'gas_cb_' + Math.floor(Math.random() * 1000000);
    window[cbName] = (res) => { cb(res); delete window[cbName]; const t = document.getElementById(cbName); if(t) t.remove(); };
    const s = document.createElement('script'); s.id = cbName;
    s.src = `${DEPLOY_URL}?action=${func}&callback=${cbName}&data=${encodeURIComponent(JSON.stringify(params))}&v=${Date.now()}`;
    s.onerror = () => { toast("連線失敗，請檢查部署權限", "#D32F2F"); };
    document.body.appendChild(s);
  }

  // 封裝成 Promise 以支援 async/await
  function callGASPromise(func, params) {
    return new Promise((resolve, reject) => {
      const cbName = 'gas_cb_' + Math.floor(Math.random() * 1000000);
      window[cbName] = (res) => {
        delete window[cbName];
        const t = document.getElementById(cbName); if(t) t.remove();
        if(res.error) reject(res.error); else resolve(res);
      };
      const s = document.createElement('script'); s.id = cbName;
      s.src = `${DEPLOY_URL}?action=${func}&callback=${cbName}&data=${encodeURIComponent(JSON.stringify(params))}&v=${Date.now()}`;
      s.onerror = () => reject("連線失敗");
      document.body.appendChild(s);
    });
  }

  document.addEventListener("DOMContentLoaded", () => {
    loadSchools(); updateStats(); setInterval(updateStats, 15000);
    document.getElementById("searchBtn").onclick = search;
    document.getElementById("clearBtn").onclick = () => { 
      document.querySelectorAll(".main-content input").forEach(i=>i.value="");
      document.getElementById("resultArea").innerHTML = '<p style="text-align: center; color: #999;">欄位已清空</p>';
    };
    document.getElementById("addBtn").onclick = () => document.getElementById("addModal").style.display='flex';
    document.getElementById("resetBtn").onclick = () => document.getElementById("pwdModal").style.display='flex';
    document.getElementById("importBtn").onclick = () => document.getElementById("fileInput").click();
    document.getElementById("fileInput").onchange = (e) => handleFile(e.target.files[0]);
    document.getElementById("checkinBtn").onclick = () => handleCheck(true);
    document.getElementById("cancelCheckinBtn").onclick = () => handleCheckAction(false);
    
    const dropCard = document.getElementById("dropCard");
    dropCard.ondragover = (e) => { e.preventDefault(); dropCard.classList.add("dragover"); };
    dropCard.ondragleave = () => dropCard.classList.remove("dragover");
    dropCard.ondrop = (e) => { e.preventDefault(); dropCard.classList.remove("dragover"); if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]); };
  });

  function loadSchools() { callGAS('getPrimarySchools', {}, list => { const s = document.getElementById("primarySchool"); s.innerHTML = '<option value="">全部國小</option>'; if(Array.isArray(list)) list.forEach(i=>s.innerHTML+=`<option value="${i}">${i}</option>`); }); }
  function updateStats() { callGAS('getStatisticsData', {}, d => { if(!d||!d.length) return; let h = '<table class="stats-table">'; d.forEach((r, i) => { const c = i<=1?'stats-header':([4,5,9,11,13].includes(i)?'highlight-pink':''); h+=`<tr class="${c}">` + r.map(v=>i===0?`<th>${v}</th>`:`<td>${v}</td>`).join('') + '</tr>'; }); document.getElementById("statsArea").innerHTML = h+'</table>'; }); }

  function search() {
    const f = { tempId: document.getElementById("tempId").value.trim(), idNumber: document.getElementById("idNumber").value.trim(), studentName: document.getElementById("studentName").value.trim(), primarySchool: document.getElementById("primarySchool").value, reportStatus: document.getElementById("reportStatus").value };
    document.getElementById("resultArea").innerHTML = '<p style="text-align:center;">正在載入結果...</p>';
    callGAS('queryStudentData', f, res => {
      if (!res.data.length) { document.getElementById("resultArea").innerHTML = "查無資料"; return; }
      let h = '<table class="data-table"><thead><tr>' + res.headers.map(v=>`<th>${v}</th>`).join('') + '<th>操作</th></tr></thead><tbody>';
      res.data.forEach(r => {
        h += '<tr>' + r.map((v, idx) => {
          const edit = [4, 5, 7].includes(idx);
          return `<td class="${edit?'editable':''}"><span>${v}</span>${edit?`<input type="text" value="${v}" style="display:none">`:''}</td>`;
        }).join('') + '<td><button class="btn-search" style="font-size:14px;padding:5px 10px;" onclick="toggleEdit(this)">修正</button></td></tr>';
      });
      document.getElementById("resultArea").innerHTML = h+'</tbody></table>';
    });
  }

  function toggleEdit(btn) {
    const tr = btn.closest("tr"); const editables = tr.querySelectorAll(".editable"); const isSaving = btn.innerText === "儲存";
    if (!isSaving) {
      btn.innerText = "儲存"; btn.style.background = "#27ae60";
      editables.forEach(td => { td.querySelector("span").style.display="none"; td.querySelector("input").style.display="block"; });
    } else {
      btn.disabled = true; btn.innerText = "...";
      const rowData = Array.from(tr.cells).map(td => td.querySelector("input") ? td.querySelector("input").value : (td.querySelector("span")?.innerText || td.innerText)).slice(0,8);
      callGAS('updateStudentData', rowData, msg => {
        toast(msg, "#27ae60"); btn.disabled = false; btn.innerText = "修正"; btn.style.background = "";
        editables.forEach(td => { const v = td.querySelector("input").value; td.querySelector("span").innerText = v; td.querySelector("span").style.display="inline"; td.querySelector("input").style.display="none"; });
        updateStats();
      });
    }
  }

  function handleCheck(isIn) {
    const id = document.getElementById("tempId").value.trim(); if(!id) return toast("請輸入臨時編號", "#FFA500");
    toast("系統處理中...", "#007BFF");
    callGAS(isIn?'submitCheckIn':'cancelCheckIn', id, res => {
      const msg = typeof res==='string'?res.replace(/<[^>]*>/g,""):"連線異常";
      toast(msg, msg.includes("成功")?"#28a745":"#D32F2F");
      if(msg.includes("成功")) { updateStats(); document.getElementById("tempId").value = ""; }
    });
  }

  function saveStudent() {
    const d = { nT: document.getElementById("nT").value.trim(), nI: document.getElementById("nI").value.trim(), nN: document.getElementById("nN").value.trim(), nG: document.getElementById("nG").value, nS: document.getElementById("nS").value.trim(), nP1: document.getElementById("nP1").value.trim(), nP2: document.getElementById("nP2").value.trim() };
    if(!d.nT||!d.nI||!d.nN) return toast("必填欄位不可空白", "#D32F2F");
    callGAS('addNewStudent', d, res => { toast(res.success||res.error, res.success?"#28a745":"#D32F2F"); if(res.success) { closeModal('addModal'); updateStats(); } });
  }

  function doReset() {
    const p = document.getElementById("sysPwd").value;
    callGAS('clearAllData', p, res => { toast(res.success||res.error, res.success?"#28a745":"#D32F2F"); if(res.success) { closeModal('pwdModal'); updateStats(); } });
  }

  // ★ 分批匯入邏輯 (解決資料量過大問題) ★
  async function handleFile(f) {
    if(!f) return; toast("解析 Excel 資料中...", "#007BFF");
    const r = new FileReader();
    
    r.onload = async (ev) => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), {type:'array'});
        const d = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
        if(d.length < 2) return toast("Excel 無內容", "#D32F2F");
        
        const h = d[0];
        const find = (keywords) => h.findIndex(t => t && keywords.some(k => t.toString().includes(k)));
        const m = { 
          t: find(["臨時編班", "臨時編號", "編號"]), 
          i: find(["身分證"]), 
          n: find(["姓名"]), 
          g: find(["性別"]), 
          s: find(["畢業國小", "國小"]),
          p1: find(["電話１", "電話1"]),
          p2: find(["電話２", "電話2"])
        };
        
        if (m.t === -1 || m.n === -1) return toast("無法辨識 Excel 欄位標題", "#D32F2F");
        
        const final = d.slice(1).map(row => [
          row[m.t]||"", row[m.i]||"", row[m.n]||"", 
          row[m.g]||"", row[m.s]||"", row[m.p1]||"", row[m.p2]||""
        ]).filter(r=>r[0]||r[2]);

        // 分批上傳 (Batching)
        const BATCH_SIZE = 50; // 每批 50 筆，避免網址過長
        const totalBatches = Math.ceil(final.length / BATCH_SIZE);
        
        for (let i = 0; i < totalBatches; i++) {
          const chunk = final.slice(i * BATCH_SIZE, (i + 1) * BATCH_SIZE);
          const mode = (i === 0) ? 'overwrite' : 'append'; // 第一批覆寫，後面追加
          
          toast(`正在匯入第 ${i + 1}/${totalBatches} 批資料...`, "#007BFF");
          
          // 使用 Promise 等待每一批完成
          try {
            await callGASPromise('importStudentData', { rows: chunk, mode: mode });
          } catch(err) {
            return toast(`匯入中斷於第 ${i+1} 批: ${err}`, "#D32F2F");
          }
        }

        toast(`全數匯入完成！共 ${final.length} 筆`, "#28a745");
        updateStats(); 
        loadSchools();

      } catch (err) {
        toast("讀取檔案失敗: " + err, "#D32F2F");
      }
    };
    r.readAsArrayBuffer(f);
  }

  function toast(t, c) { const m = document.getElementById("statusMessage"); m.style.backgroundColor = c; m.innerHTML = t; m.style.display = 'block'; setTimeout(() => m.style.display = 'none', 5000); }
  function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
