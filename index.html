<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鳳甲國中新生報到管理系統</title>
  <!-- 引入 Excel 處理函式庫 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #007BFF;
      --secondary: #E9F2FF;
      --accent: #FF69B4;
      --warning: #FFA500;
      --danger: #D32F2F;
      --success: #28a745;
      --bg: #f4f7f9;
      --text: #333;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
    }

    * { box-sizing: border-box; }
    body {
      font-family: "Microsoft JhengHei", "PingFang TC", Arial, sans-serif;
      background-color: var(--bg);
      margin: 0; padding: 0;
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* 響應式佈局：手機滑動模式 */
    .app-container {
      max-width: 1440px;
      margin: 20px auto;
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 20px;
      padding: 0 20px;
      transition: all 0.3s;
    }

    @media (max-width: 850px) {
      body { height: 100vh; width: 100vw; }
      .app-container {
        display: flex;
        width: 100vw;
        height: 100vh;
        margin: 0;
        padding: 0;
        gap: 0;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
      }
      .main-content, .side-content {
        flex: 0 0 100vw;
        width: 100vw;
        height: 100vh;
        overflow-y: auto;
        scroll-snap-align: start;
        padding: 20px;
      }
      .scroll-hint {
        position: fixed;
        bottom: 15px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.6);
        color: white;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 12px;
        z-index: 1000;
        pointer-events: none;
      }
    }

    @media (min-width: 851px) {
      .scroll-hint { display: none; }
    }

    /* 卡片設計 */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 25px;
      margin-bottom: 20px;
      border: 1px solid rgba(0,0,0,0.05);
    }

    h2, h3 {
      margin-top: 0;
      color: var(--primary);
      border-left: 6px solid var(--primary);
      padding-left: 15px;
      margin-bottom: 20px;
    }

    /* 表單格線 */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 5px;
      color: #666;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }

    /* 按鈕樣式 */
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:active { transform: scale(0.98); opacity: 0.9; }
    button:disabled { background-color: #ccc !important; cursor: not-allowed; }

    .btn-search { background-color: var(--primary); }
    .btn-add { background-color: var(--accent); }
    .btn-checkin { background-color: var(--warning); }
    .btn-cancel { background-color: var(--danger); }
    .btn-import { background-color: #483D8B; }
    .btn-reset { background-color: #8B0000; }
    .btn-clear { background-color: #6c757d; }

    /* 統計表格 */
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
      background: white;
    }
    .stats-table th, .stats-table td {
      padding: 12px;
      border: 1px solid #eef2f7;
      text-align: left;
    }
    .stats-header { background: var(--primary); color: white; font-weight: bold; }
    .highlight-pink { background-color: #fff0f5; }

    /* 結果表格 */
    .result-container { overflow-x: auto; margin-top: 10px; }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px;
    }
    .data-table th { background-color: var(--primary); color: white; padding: 12px; text-align: center; }
    .data-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
    .data-table tr:hover { background-color: var(--secondary); }

    /* 異常顯示 */
    .error-box {
      color: var(--danger);
      text-align: center;
      padding: 60px 0;
      font-weight: bold;
      font-size: 20px;
    }

    /* 浮動訊息 */
    #statusMessage {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 28px;
      border-radius: 50px;
      color: white;
      font-weight: bold;
      z-index: 3000;
      display: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    /* 彈窗 */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 2000;
      backdrop-filter: blur(2px);
    }
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

<div id="statusMessage"></div>
<div class="scroll-hint">⬅️ 左右滑動切換「操作區」與「統計看板」 ➡️</div>

<div class="app-container">
  <!-- 操作區 -->
  <div class="main-content">
    <div class="card">
      <h2>鳳甲國中報到管理系統</h2>
      <div class="form-grid">
        <div class="form-group"><label>臨時編號</label><input type="text" id="tempId" placeholder="輸入編號"></div>
        <div class="form-group"><label>身分證號</label><input type="text" id="idNumber" placeholder="輸入證號"></div>
        <div class="form-group"><label>學生姓名</label><input type="text" id="studentName" placeholder="輸入姓名"></div>
        <div class="form-group">
          <label>畢業國小</label>
          <select id="primarySchool"><option value="">載入中...</option></select>
        </div>
        <div class="form-group">
          <label>報到狀態</label>
          <select id="reportStatus">
            <option value="">全部</option>
            <option value="已報到">已報到</option>
            <option value="未報到">未報到</option>
          </select>
        </div>
      </div>

      <div class="btn-group">
        <button id="searchBtn" class="btn-search">🔍 查詢</button>
        <button id="addBtn" class="btn-add">➕ 新增</button>
        <button id="checkinBtn" class="btn-checkin">✅ 報到</button>
        <button id="cancelCheckinBtn" class="btn-cancel">❌ 取消</button>
        <button id="importBtn" class="btn-import">📥 匯入</button>
        <button id="resetBtn" class="btn-reset">🗑️ 清空資料</button>
        <button id="clearBtn" class="btn-clear">🧹 清除欄位</button>
      </div>
      <input type="file" id="fileInput" style="display:none;" accept=".xlsx,.xls">
    </div>

    <div class="card">
      <h3>查詢結果</h3>
      <div id="resultArea" class="result-container">
        <p style="text-align: center; color: #999; padding: 20px 0;">請輸入條件並點擊查詢</p>
      </div>
    </div>
  </div>

  <!-- 統計區 -->
  <div class="side-content">
    <div class="card">
      <h3>📊 即時統計看板</h3>
      <div id="statsArea">
        <p style="text-align: center; color: #999;">連線中...</p>
      </div>
    </div>
  </div>
</div>

<!-- 彈窗：新增學生 -->
<div id="addModal" class="modal">
  <div class="modal-content">
    <h3>新增學生資料</h3>
    <div class="form-grid" style="grid-template-columns: 1fr;">
      <input type="text" id="nT" placeholder="臨時編號 *">
      <input type="text" id="nI" placeholder="身分證號 *">
      <input type="text" id="nN" placeholder="姓名 *">
      <select id="nG"><option value="男">男</option><option value="女">女</option></select>
      <input type="text" id="nS" placeholder="畢業國小 *">
      <input type="text" id="nP1" placeholder="電話 1">
      <input type="text" id="nP2" placeholder="電話 2">
    </div>
    <div class="btn-group" style="justify-content: flex-end; margin-top: 20px;">
      <button onclick="saveStudent()" class="btn-search">確認存檔</button>
      <button onclick="closeModal('addModal')" class="btn-clear">關閉</button>
    </div>
  </div>
</div>

<!-- 彈窗：清空驗證 -->
<div id="pwdModal" class="modal">
  <div class="modal-content" style="max-width: 380px;">
    <h3>系統清除確認</h3>
    <p style="color:red; font-weight:bold;">警告：這將清除所有報到紀錄與學生名單！</p>
    <p>請輸入管理密碼 (000000)：</p>
    <input type="password" id="sysPwd" placeholder="請輸入密碼" style="margin-bottom: 20px;">
    <div class="btn-group" style="justify-content: flex-end;">
      <button onclick="doReset()" class="btn-reset">確認清空</button>
      <button onclick="closeModal('pwdModal')" class="btn-clear">取消</button>
    </div>
  </div>
</div>

<script>
  // 連線偵測
  const isGAS = (typeof google !== 'undefined' && google.script && google.script.run);

  document.addEventListener("DOMContentLoaded", () => {
    if (!isGAS) {
      showError("資料連接異常");
      return;
    }
    init();
  });

  function showError(msg) {
    const errHtml = `<div class="error-box">${msg}</div>`;
    document.getElementById("statsArea").innerHTML = errHtml;
    document.getElementById("resultArea").innerHTML = errHtml;
    document.getElementById("primarySchool").innerHTML = '<option value="">連線異常</option>';
  }

  function init() {
    loadSchools();
    updateStats();
    // 每 10 秒自動更新統計
    setInterval(updateStats, 10000);

    // 綁定按鈕
    document.getElementById("searchBtn").onclick = search;
    document.getElementById("clearBtn").onclick = () => { 
      document.querySelectorAll(".main-content input").forEach(i => i.value = ""); 
      document.getElementById("resultArea").innerHTML = '<p style="text-align: center; color: #999;">欄位已清空</p>';
    };
    document.getElementById("addBtn").onclick = () => openModal('addModal');
    document.getElementById("resetBtn").onclick = () => openModal('pwdModal');
    document.getElementById("importBtn").onclick = () => document.getElementById("fileInput").click();
    document.getElementById("fileInput").onchange = handleImport;
    document.getElementById("checkinBtn").onclick = () => handleCheckAction(true);
    document.getElementById("cancelCheckinBtn").onclick = () => handleCheckAction(false);
  }

  function loadSchools() {
    google.script.run.withSuccessHandler(list => {
      const s = document.getElementById("primarySchool");
      s.innerHTML = '<option value="">全部</option>';
      if (list) list.forEach(item => { s.innerHTML += `<option value="${item}">${item}</option>`; });
    }).getPrimarySchools();
  }

  function updateStats() {
    google.script.run.withSuccessHandler(data => {
      if (!data || data.length === 0) return;
      let html = '<table class="stats-table">';
      data.forEach((row, i) => {
        const isHeader = i === 0 || i === 1;
        const isPink = [4, 5, 9, 11, 13].includes(i);
        const rowClass = isHeader ? 'stats-header' : (isPink ? 'highlight-pink' : '');
        html += `<tr class="${rowClass}">` + row.map(c => i === 0 ? `<th>${c}</th>` : `<td>${c}</td>`).join('') + '</tr>';
      });
      document.getElementById("statsArea").innerHTML = html + '</table>';
    }).withFailureHandler(() => showError("資料連接異常")).getStatisticsData();
  }

  function search() {
    const f = {
      tempId: document.getElementById("tempId").value.trim(),
      idNumber: document.getElementById("idNumber").value.trim(),
      studentName: document.getElementById("studentName").value.trim(),
      primarySchool: document.getElementById("primarySchool").value,
      reportStatus: document.getElementById("reportStatus").value
    };
    document.getElementById("resultArea").innerHTML = '<p style="text-align:center;">搜尋中...</p>';
    google.script.run.withSuccessHandler(res => {
      if (!res.data.length) { document.getElementById("resultArea").innerHTML = '<p style="text-align:center; color:red;">查無資料</p>'; return; }
      let html = '<table class="data-table"><thead><tr>' + res.headers.map(h => `<th>${h}</th>`).join('') + '<th>操作</th></tr></thead><tbody>';
      res.data.forEach(r => { 
        html += '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '<td><button class="btn-add" style="font-size:12px;padding:4px 10px;">修正</button></td></tr>'; 
      });
      document.getElementById("resultArea").innerHTML = html + '</tbody></table>';
    }).queryStudentData(f);
  }

  function handleCheckAction(isCheckIn) {
    const tid = document.getElementById("tempId").value.trim();
    if (!tid) return toast("請輸入臨時編號", "#FFA500");
    toast("處理中...", "#007BFF");
    google.script.run.withSuccessHandler(res => {
      const text = res.replace(/<[^>]*>/g, "");
      const success = res.includes("成功");
      toast(text, success ? "#28a745" : "#D32F2F");
      if (success) { 
        updateStats(); 
        document.getElementById("tempId").value = "";
      }
    })[isCheckIn ? "submitCheckIn" : "cancelCheckIn"](tid);
  }

  function saveStudent() {
    const d = { 
      newTempId: document.getElementById("nT").value.trim(), 
      newIdNumber: document.getElementById("nI").value.trim(), 
      newStudentName: document.getElementById("nN").value.trim(), 
      newGender: document.getElementById("nG").value,
      newPrimarySchool: document.getElementById("nS").value.trim(),
      newPhone1: document.getElementById("nP1").value.trim(),
      newPhone2: document.getElementById("nP2").value.trim()
    };
    if (!d.newTempId || !d.newIdNumber || !d.newStudentName) return toast("必填欄位不可空白", "#D32F2F");
    toast("正在新增...", "#007BFF");
    google.script.run.withSuccessHandler(res => {
      if (res.error) toast(res.error, "#D32F2F");
      else {
        toast(res.success, "#28a745");
        closeModal('addModal');
        updateStats();
        // 清空欄位
        document.querySelectorAll("#addModal input").forEach(i => i.value = "");
      }
    }).addNewStudent(d);
  }

  function doReset() {
    const p = document.getElementById("sysPwd").value;
    if (!p) return toast("請輸入密碼", "#FFA500");
    toast("正在清空資料...", "#007BFF");
    google.script.run.withSuccessHandler(res => {
      if (res.error) toast(res.error, "#D32F2F");
      else {
        toast(res.success, "#28a745");
        closeModal('pwdModal');
        updateStats();
        document.getElementById("sysPwd").value = "";
      }
    }).clearAllData(p);
  }

  function handleImport(e) {
    const f = e.target.files[0];
    if (!f) return;
    toast("資料解析與匯入中...", "#007BFF");
    const reader = new FileReader();
    reader.onload = (ev) => {
      const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
      const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
      if (data.length < 2) return toast("Excel 無內容", "#D32F2F");

      const h = data[0];
      const findCol = (n) => h.findIndex(t => t && t.toString().includes(n));
      const m = { 
        t: findCol("臨時編班"), i: findCol("身分證字號"), n: findCol("姓名"), 
        g: findCol("性別"), s: findCol("畢業國小"), p1: findCol("電話１"), p2: findCol("電話２") 
      };

      const final = data.slice(1).map(row => [
        row[m.t] || "", row[m.i] || "", row[m.n] || "", 
        row[m.g] || "", row[m.s] || "", row[m.p1] || "", row[m.p2] || ""
      ]).filter(r => r[0] || r[1] || r[2]);

      google.script.run.withSuccessHandler(res => {
        if (res.error) toast(res.error, "#D32F2F");
        else {
          toast(res.success, "#28a745");
          updateStats();
          loadSchools();
        }
        e.target.value = ""; // 清空 input
      }).importStudentData(final);
    };
    reader.readAsArrayBuffer(f);
  }

  function toast(t, c) {
    const m = document.getElementById("statusMessage");
    m.style.backgroundColor = c;
    m.innerHTML = t;
    m.style.display = 'block';
    setTimeout(() => m.style.display = 'none', 4000);
  }

  function openModal(id) { document.getElementById(id).style.display = 'flex'; }
  function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
