<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鳳甲國中新生報到管理系統</title>
  <!-- 引入 Excel 處理函式庫 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --primary: #007BFF;
      --secondary: #E9F2FF;
      --accent: #FF69B4;
      --warning: #FFA500;
      --danger: #D32F2F;
      --success: #28a745;
      --bg: #f4f7f9;
      --text: #333;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
      /* 定義字體大小變數 */
      --font-main-title: 50px;
      --font-content: 20px;
      --font-sub-title: 32px;
    }

    * { box-sizing: border-box; }
    body {
      font-family: "Microsoft JhengHei", "PingFang TC", Arial, sans-serif;
      background-color: var(--bg);
      margin: 0; padding: 0;
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
      font-size: var(--font-content); /* 全域內容大小設定為 20px */
    }

    /* 響應式佈局設計 */
    .app-container {
      max-width: 1600px; /* 放寬最大寬度以容納大字體 */
      margin: 20px auto;
      display: grid;
      grid-template-columns: 1fr 450px;
      gap: 25px;
      padding: 0 20px;
    }

    /* 手機滑動分頁模式 (寬度小於 850px) */
    @media (max-width: 850px) {
      body { height: 100vh; width: 100vw; }
      .app-container {
        display: flex;
        width: 100vw;
        height: 100vh;
        margin: 0; padding: 0; gap: 0;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
      }
      .main-content, .side-content {
        flex: 0 0 100vw;
        width: 100vw;
        height: 100vh;
        overflow-y: auto;
        scroll-snap-align: start;
        padding: 20px;
      }
      .scroll-hint {
        position: fixed;
        bottom: 15px; left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.6);
        color: white;
        padding: 8px 18px;
        border-radius: 25px;
        font-size: 14px;
        z-index: 1000;
      }
      h2 { font-size: 36px !important; } /* 手機版標題稍微縮小一點避免破版 */
    }

    @media (min-width: 851px) {
      .scroll-hint { display: none; }
    }

    /* 卡片設計 */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 30px;
      margin-bottom: 20px;
      border: 1px solid rgba(0,0,0,0.05);
    }

    h2 {
      margin-top: 0;
      color: var(--primary);
      border-left: 10px solid var(--primary); /* 藍色邊框加粗 */
      padding-left: 20px;
      margin-bottom: 25px;
      font-size: var(--font-main-title); /* 50px */
      line-height: 1.2;
    }

    h3 {
      margin-top: 0;
      color: var(--primary);
      border-left: 6px solid var(--primary);
      padding-left: 15px;
      margin-bottom: 20px;
      font-size: var(--font-sub-title); /* 32px */
    }

    /* 表單佈局 */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .form-group label {
      display: block;
      font-size: var(--font-content); /* 20px */
      font-weight: bold;
      margin-bottom: 8px;
      color: #555;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: var(--font-content); /* 20px */
    }

    /* 按鈕樣式組 */
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: var(--font-content); /* 20px */
      font-weight: bold;
      cursor: pointer;
      color: white;
      transition: all 0.2s;
    }

    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-search { background-color: var(--primary); }
    .btn-add { background-color: var(--accent); }
    .btn-checkin { background-color: var(--warning); }
    .btn-cancel { background-color: var(--danger); }
    .btn-import { background-color: #483D8B; }
    .btn-reset { background-color: #8B0000; }
    .btn-clear { background-color: #6c757d; }

    /* 統計與資料表格 */
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--font-content); /* 20px */
    }
    .stats-table th, .stats-table td {
      padding: 14px;
      border: 1px solid #eef2f7;
      text-align: left;
    }
    .stats-header { background: var(--primary); color: white; }
    .highlight-pink { background-color: #fff0f5; }

    .result-container { overflow-x: auto; margin-top: 15px; }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px; /* 放寬最小寬度容納大字 */
      font-size: var(--font-content); /* 20px */
    }
    .data-table th { background-color: var(--primary); color: white; padding: 15px; }
    .data-table td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
    .data-table tr:hover { background-color: var(--secondary); }

    .editable input {
      width: 100%;
      padding: 5px;
      border: 1px solid var(--warning);
      border-radius: 4px;
      text-align: center;
      font-size: var(--font-content);
    }

    /* 訊息彈窗 */
    #statusMessage {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 30px;
      border-radius: 50px;
      color: white;
      font-weight: bold;
      z-index: 3000;
      display: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      font-size: var(--font-content);
    }

    .error-box {
      color: var(--danger);
      text-align: center;
      padding: 50px 0;
      font-weight: bold;
      font-size: 24px;
    }

    /* 模態視窗 */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 2000;
      backdrop-filter: blur(2px);
    }
    .modal-content {
      background: white;
      padding: 35px;
      border-radius: 12px;
      width: 95%;
      max-width: 600px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .modal-content input, .modal-content select {
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

<div id="statusMessage"></div>
<div class="scroll-hint">⬅️ 左右滑動：切換「操作區」與「統計看板」 ➡️</div>

<div class="app-container">
  <!-- 主要操作與查詢區 -->
  <div class="main-content">
    <div class="card">
      <h2>鳳甲國中報到管理系統</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>臨時編號</label>
          <input type="text" id="tempId" placeholder="輸入臨時編號">
        </div>
        <div class="form-group">
          <label>身分證號</label>
          <input type="text" id="idNumber" placeholder="輸入證號">
        </div>
        <div class="form-group">
          <label>學生姓名</label>
          <input type="text" id="studentName" placeholder="輸入姓名">
        </div>
        <div class="form-group">
          <label>畢業國小</label>
          <select id="primarySchool"><option value="">全部國小</option></select>
        </div>
        <div class="form-group">
          <label>報到狀態</label>
          <select id="reportStatus">
            <option value="">全部</option>
            <option value="已報到">已報到</option>
            <option value="未報到">未報到</option>
          </select>
        </div>
      </div>

      <div class="btn-group">
        <button id="searchBtn" class="btn-search">🔍 查詢資料</button>
        <button id="addBtn" class="btn-add">➕ 新增新生</button>
        <button id="checkinBtn" class="btn-checkin">✅ 辦理報到</button>
        <button id="cancelCheckinBtn" class="btn-cancel">❌ 取消報到</button>
        <button id="importBtn" class="btn-import">📥 匯入 Excel</button>
        <button id="resetBtn" class="btn-reset">🗑️ 清空重設</button>
        <button id="clearBtn" class="btn-clear">🧹 清除欄位</button>
      </div>
      <input type="file" id="fileInput" style="display:none;" accept=".xlsx,.xls">
    </div>

    <div class="card">
      <h3>查詢結果</h3>
      <div id="resultArea" class="result-container">
        <p style="text-align: center; color: #999; padding: 40px 0;">請設定條件並執行查詢</p>
      </div>
    </div>
  </div>

  <!-- 統計看板區 -->
  <div class="side-content">
    <div class="card">
      <h3>📊 即時統計看板</h3>
      <div id="statsArea">
        <p style="text-align: center; color: #999;">連線中...</p>
      </div>
    </div>
  </div>
</div>

<!-- 彈窗：新增新生 -->
<div id="addModal" class="modal">
  <div class="modal-content">
    <h3>新增學生資料</h3>
    <div class="form-grid" style="grid-template-columns: 1fr;">
      <input type="text" id="nT" placeholder="臨時編號 *">
      <input type="text" id="nI" placeholder="身分證號 *">
      <input type="text" id="nN" placeholder="姓名 *">
      <select id="nG">
        <option value="男">男</option>
        <option value="女">女</option>
      </select>
      <input type="text" id="nS" placeholder="畢業國小 *">
      <input type="text" id="nP1" placeholder="連絡電話 1">
      <input type="text" id="nP2" placeholder="連絡電話 2">
    </div>
    <div class="btn-group" style="justify-content: flex-end; margin-top: 15px;">
      <button onclick="saveStudent()" class="btn-search">確認存檔</button>
      <button onclick="closeModal('addModal')" class="btn-clear">取消</button>
    </div>
  </div>
</div>

<!-- 彈窗：密碼驗證 -->
<div id="pwdModal" class="modal">
  <div class="modal-content" style="max-width: 450px;">
    <h3>權限驗證</h3>
    <p style="color:red; font-weight:bold;">警告：這將清除所有名單與報到資料！</p>
    <p>請輸入管理密碼 (000000)：</p>
    <input type="password" id="sysPwd" placeholder="請輸入密碼" style="margin-bottom: 25px;">
    <div class="btn-group" style="justify-content: flex-end;">
      <button onclick="doReset()" class="btn-reset">確認執行</button>
      <button onclick="closeModal('pwdModal')" class="btn-clear">返回</button>
    </div>
  </div>
</div>

<script>
  /**
   * 鳳甲國中新生報到管理系統核心邏輯
   * 試算表：https://docs.google.com/spreadsheets/d/1MOc_gvRLwNgXOfwOsJPb7av1wTu6sP6rhhtsmPXJ5Y4/
   */
  const DEPLOY_ID = "AKfycbxpY4iHHkEkdNsBvLdb2OJPqzn0eY14CWjLRiEoDJ0IBUhucE2Pp5dJepyZR5AxP_LO";
  const DEPLOY_URL = `https://script.google.com/macros/s/${DEPLOY_ID}/exec`;

  // 跨網域連線函式 (JSONP 模式)
  function callGAS(func, params, cb) {
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      // 內置 Google Apps Script 環境執行
      google.script.run.withSuccessHandler(cb)[func](params);
    } else {
      // 外部環境 (如 GitHub 或本地預覽)
      const cbName = 'gas_cb_' + Math.floor(Math.random() * 1000000);
      window[cbName] = (res) => {
        cb(res);
        delete window[cbName];
        const t = document.getElementById(cbName);
        if (t) t.remove();
      };
      const s = document.createElement('script');
      s.id = cbName;
      const dataStr = encodeURIComponent(JSON.stringify(params));
      s.src = `${DEPLOY_URL}?action=${func}&callback=${cbName}&data=${dataStr}&v=${Date.now()}`;
      s.onerror = () => showError("資料連線異常。請確認 Google Script 部署權限是否設為「所有人」。");
      document.body.appendChild(s);
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    init();
  });

  function init() {
    loadSchools();
    updateStats();
    // 設定每 15 秒更新一次右側統計看板
    setInterval(updateStats, 15000);

    // 綁定所有按鈕事件
    document.getElementById("searchBtn").onclick = search;
    document.getElementById("clearBtn").onclick = () => { 
      document.querySelectorAll(".main-content input").forEach(i => i.value = ""); 
      document.getElementById("resultArea").innerHTML = '<p style="text-align: center; color: #999;">查詢欄位已清空</p>';
    };
    document.getElementById("addBtn").onclick = () => openModal('addModal');
    document.getElementById("resetBtn").onclick = () => openModal('pwdModal');
    document.getElementById("importBtn").onclick = () => document.getElementById("fileInput").click();
    document.getElementById("fileInput").onchange = handleImport;
    document.getElementById("checkinBtn").onclick = () => handleCheckAction(true);
    document.getElementById("cancelCheckinBtn").onclick = () => handleCheckAction(false);
  }

  function showError(msg) {
    const e = `<div class="error-box">${msg}</div>`;
    document.getElementById("statsArea").innerHTML = e;
    document.getElementById("resultArea").innerHTML = e;
  }

  function loadSchools() {
    callGAS('getPrimarySchools', {}, list => {
      const s = document.getElementById("primarySchool");
      s.innerHTML = '<option value="">全部國小</option>';
      if (Array.isArray(list)) {
        list.forEach(item => { s.innerHTML += `<option value="${item}">${item}</option>`; });
      }
    });
  }

  function updateStats() {
    callGAS('getStatisticsData', {}, d => {
      if (!d || !d.length) return;
      let h = '<table class="stats-table">';
      d.forEach((r, i) => {
        const c = i <= 1 ? 'stats-header' : ([4, 5, 9, 11, 13].includes(i) ? 'highlight-pink' : '');
        h += `<tr class="${c}">` + r.map(v => i === 0 ? `<th>${v}</th>` : `<td>${v}</td>`).join('') + '</tr>';
      });
      document.getElementById("statsArea").innerHTML = h + '</table>';
    });
  }

  function search() {
    const f = {
      tempId: document.getElementById("tempId").value.trim(),
      idNumber: document.getElementById("idNumber").value.trim(),
      studentName: document.getElementById("studentName").value.trim(),
      primarySchool: document.getElementById("primarySchool").value,
      reportStatus: document.getElementById("reportStatus").value
    };
    const area = document.getElementById("resultArea");
    area.innerHTML = '<p style="text-align:center;">正在載入查詢結果...</p>';
    
    callGAS('queryStudentData', f, res => {
      if (!res.data || res.data.length === 0) { 
        area.innerHTML = '<p style="text-align:center; color:red;">查無相符的新生資料。</p>'; 
        return; 
      }
      let h = '<table class="data-table"><thead><tr>' + res.headers.map(v => `<th>${v}</th>`).join('') + '<th>處理</th></tr></thead><tbody>';
      res.data.forEach(r => {
        h += '<tr>' + r.map((v, idx) => {
          const edit = [4, 5, 7].includes(idx); 
          return `<td class="${edit ? 'editable' : ''}"><span>${v}</span>${edit ? `<input type="text" value="${v}" style="display:none">` : ''}</td>`;
        }).join('') + '<td><button class="btn-add" style="font-size:16px;padding:6px 12px;" onclick="toggleEdit(this)">修正</button></td></tr>';
      });
      area.innerHTML = h + '</tbody></table>';
    });
  }

  function toggleEdit(btn) {
    const tr = btn.closest("tr");
    const editables = tr.querySelectorAll(".editable");
    const isSaving = btn.innerText === "儲存";

    if (!isSaving) {
      btn.innerText = "儲存";
      btn.style.background = "#27ae60";
      editables.forEach(td => {
        td.querySelector("span").style.display = "none";
        td.querySelector("input").style.display = "block";
      });
    } else {
      btn.disabled = true;
      btn.innerText = "...";
      const rowData = Array.from(tr.cells).map(td => {
        const input = td.querySelector("input");
        return input ? input.value : (td.querySelector("span")?.innerText || td.innerText);
      }).slice(0, 8);

      callGAS('updateStudentData', rowData, msg => {
        toast(msg, "#27ae60");
        btn.disabled = false;
        btn.innerText = "修正";
        btn.style.background = "";
        editables.forEach(td => {
          const v = td.querySelector("input").value;
          td.querySelector("span").innerText = v;
          td.querySelector("span").style.display = "inline";
          td.querySelector("input").style.display = "none";
        });
        updateStats();
      });
    }
  }

  function handleCheckAction(isIn) {
    const id = document.getElementById("tempId").value.trim();
    if (!id) return toast("請先輸入臨時編號", "#FFA500");
    toast("系統處理中...", "#007BFF");
    callGAS(isIn ? 'submitCheckIn' : 'cancelCheckIn', id, res => {
      const text = typeof res === 'string' ? res.replace(/<[^>]*>/g, "") : (res.error || "連線異常");
      toast(text, text.includes("成功") ? "#28a745" : "#D32F2F");
      if (text.includes("成功")) { 
        updateStats(); 
        document.getElementById("tempId").value = ""; 
      }
    });
  }

  function saveStudent() {
    const d = { 
      nT: document.getElementById("nT").value.trim(), 
      nI: document.getElementById("nI").value.trim(), 
      nN: document.getElementById("nN").value.trim(), 
      nG: document.getElementById("nG").value, 
      nS: document.getElementById("nS").value.trim(),
      nP1: document.getElementById("nP1").value.trim(),
      nP2: document.getElementById("nP2").value.trim()
    };
    if (!d.nT || !d.nI || !d.nN) return toast("星號欄位為必填項目", "#D32F2F");
    callGAS('addNewStudent', d, res => {
      toast(res.success || res.error, res.success ? "#28a745" : "#D32F2F");
      if (res.success) { closeModal('addModal'); updateStats(); }
    });
  }

  function doReset() {
    const p = document.getElementById("sysPwd").value;
    callGAS('clearAllData', p, res => {
      toast(res.success || res.error, res.success ? "#28a745" : "#D32F2F");
      if (res.success) { 
        closeModal('pwdModal'); 
        updateStats(); 
        document.getElementById("sysPwd").value = "";
      }
    });
  }

  function handleImport(e) {
    const f = e.target.files[0];
    if (!f) return;
    toast("資料解析並匯入中，請稍候...", "#007BFF");
    const r = new FileReader();
    r.onload = (ev) => {
      const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
      const d = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
      if (d.length < 2) return toast("Excel 檔案內無有效學生資料", "#D32F2F");
      
      const h = d[0];
      const find = (n) => h.findIndex(t => t && t.toString().includes(n));
      const m = { 
        t: find("臨時編班"), i: find("身分證字號"), n: find("姓名"), 
        g: find("性別"), s: find("畢業國小"), p1: find("電話１"), p2: find("電話２") 
      };
      
      const final = d.slice(1).map(row => [
        row[m.t] || "", row[m.i] || "", row[m.n] || "", 
        row[m.g] || "", row[m.s] || "", row[m.p1] || "", row[m.p2] || ""
      ]).filter(r => r[0] || r[1] || r[2]);

      callGAS('importStudentData', final, res => {
        toast(res.success || res.error, res.success ? "#28a745" : "#D32F2F");
        updateStats();
        loadSchools();
      });
    };
    reader.readAsArrayBuffer(f);
  }

  function toast(t, c) {
    const m = document.getElementById("statusMessage");
    m.style.backgroundColor = c;
    m.innerHTML = t;
    m.style.display = 'block';
    setTimeout(() => m.style.display = 'none', 4500);
  }

  function openModal(id) { document.getElementById(id).style.display = 'flex'; }
  function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
